<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapomat – Legal</title>
  <style>
    :root {
      --bg: #000000;
      --text: #FFFFFF;
      --accent: #E8B84B;
      --muted: #999999;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 24px 20px;
      border-bottom: 1px solid #1a1a1a;
    }
    .logo {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 18px;
      text-decoration: none;
    }
    main {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 20px;
      flex: 1;
    }
    h1 { color: var(--text); font-size: 28px; margin-top: 0; text-align: center; }
    .subtitle { color: var(--muted); text-align: center; margin-bottom: 36px; }
    .links { display: flex; flex-direction: column; gap: 14px; }
    .btn {
      display: block;
      background: var(--accent);
      color: #000000;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
    }
    .btn:hover { opacity: 0.9; }
    footer {
      border-top: 1px solid #1a1a1a;
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">SNAPOMAT</a>
  </header>
  <main>
    <h1>Legal & Support</h1>
    <p class="subtitle">Everything you need to know about Snapomat</p>
    <div class="links">
      <a class="btn" href="privacy.html">Privacy Policy</a>
      <a class="btn" href="terms.html">Terms of Service</a>
      <a class="btn" href="support.html">Support</a>
      <a class="btn" href="impressum.html">Impressum</a>
    </div>
  </main>
  <footer>
    © 2026 Thomas Brandtner · Snapomat
  </footer>
</body>
</html>
